name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meauxbility-react/package-lock.json

      - name: Install dependencies
        working-directory: meauxbility-react
        run: npm ci

      - name: Build React app
        working-directory: meauxbility-react
        run: npm run build
        env:
          NODE_ENV: production

      - name: Prepare deployment directory
        run: |
          mkdir -p dist
          cp -r meauxbility-react/dist/. dist/
          cp -r functions dist/functions

      - name: Deploy to Cloudflare Pages with Wrangler
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiKey: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=meauxbility-dev
